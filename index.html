<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BREW — Chennai's Café Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Firebase SDK (Compat version for easier integration) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="bg-deco"></div>

<!-- Header -->
<header>
  <a href="index.html" class="header-logo">
    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M2 21v-2.258l.316-2.632C3.604 15.518 4 14.392 4 13.186 4 7.365 8.363 3 13.318 3c4.562 0 8.249 3.898 8.249 8.724 0 4.297-3.422 7.802-8.001 8.462v2.112h-1.56V21H2zm2-4h14.959l.881-7.375C18.258 9.461 18 8.653 18 7.746 18 4.12 14.366 1 10.097 1S2.196 4.12 2 7.746c0 .908.258 1.715.719 2.38L4 17z"/>
    </svg>
    <div>
      <h1>BREW</h1>
      <span>CHENNAI CAFÉS</span>
    </div>
  </a>
  <nav class="header-nav">
    <a href="index.html" class="nav-link active">Discover</a>
    <a href="reviews.html" class="nav-link">Reviews</a>
    <a href="bookings.html" class="nav-link">My Bookings</a>
    <a href="favorites.html" class="nav-link">Favorites</a>
  </nav>
  <div class="header-right">
    <p class="welcome-txt">Hi, <strong id="user-display">Guest</strong></p>
    <button class="signout-btn" onclick="signOut()">SIGN OUT</button>
  </div>
</header>

<!-- Hero -->
<div class="hero">
  <p class="eyebrow">EXPLORE</p>
  <h2>Chennai's Finest <span>Coffee Haunts</span></h2>
  <p class="hero-sub">Discover handpicked cafés, from serene garden retreats to specialty roasteries</p>

  <!-- Search Container -->
  <div class="search-container">
    <label for="search-input" class="sr-only">Search cafés, areas, and vibes</label>
    <input class="search-box" type="text" placeholder="🔍  Search cafés, areas, vibes..." id="search-input" oninput="filterCafes()" />
  </div>
</div>

<!-- Controls (Filters only) -->
<div class="controls">
  <div class="filter-row">
    <div class="area-pills" id="area-pills"></div>
    <select class="sort-select" id="sort-select" onchange="sortCafes()">
      <option value="rating">Sort by Rating</option>
      <option value="reviews">Most Reviewed</option>
      <option value="price-low">Price: Low to High</option>
      <option value="price-high">Price: High to Low</option>
      <option value="name">Name A-Z</option>
    </select>
  </div>
  <p class="result-count" id="result-count"></p>
</div>

<!-- Grid -->
<div class="grid" id="cafe-grid">
  <div class="loading-state">
    <div class="spinner"></div>
    <p>Loading cafés...</p>
  </div>
</div>

<script src="firebase-compat-config.js"></script>
<script src="auth.js"></script>
<script src="cafe-data.js"></script>
<script src="app.js"></script>
</body>
</html>
