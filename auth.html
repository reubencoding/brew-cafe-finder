<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — BREW</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="bg-deco"></div>

<!-- Auth Page -->
<div id="auth-page">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="cup">☕</div>
      <h1>BREW</h1>
      <p>Chennai's Café Guide</p>
      <div class="divider-line"></div>
    </div>
    <div class="auth-card">
      <div class="toggle-bar">
        <button class="toggle-btn active" id="btn-signin" onclick="switchMode('signin')">Sign In</button>
        <button class="toggle-btn" id="btn-signup" onclick="switchMode('signup')">Sign Up</button>
      </div>
      <div class="fields" id="fields"></div>
      <button class="brew-btn" id="auth-submit">Enter the Café ☕</button>
      <div class="divider-or">OR CONTINUE WITH</div>
      <button class="google-btn" onclick="googleSignIn()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>
    </div>
    <p class="auth-footer">Discover the finest cafés across Chennai</p>
  </div>
</div>

<script src="firebase-compat-config.js"></script>
<script src="auth.js"></script>
</body>
</html>
