<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BREW — Chennai's Café Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Lato', sans-serif; background: #1A0F0A; color: #F5E6D3; min-height: 100vh; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1A0F0A; }
    ::-webkit-scrollbar-thumb { background: rgba(200,133,58,0.4); border-radius: 3px; }

    /* BG decoration */
    #bg-deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.045; background: radial-gradient(ellipse 60% 50% at 20% 30%, #C8853A, transparent), radial-gradient(ellipse 60% 50% at 80% 70%, #8B4513, transparent); }

    /* ===== AUTH ===== */
    #auth-page { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-wrap { width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 40px; }
    .auth-logo .cup { font-size: 52px; margin-bottom: 8px; }
    .auth-logo h1 { font-family: 'Playfair Display', serif; font-size: 42px; color: #C8853A; letter-spacing: 4px; line-height: 1; }
    .auth-logo p { font-family: 'Playfair Display', serif; font-style: italic; color: rgba(245,230,211,0.45); font-size: 13px; letter-spacing: 4px; margin-top: 4px; }
    .auth-logo .divider-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #C8853A, transparent); margin: 14px auto 0; }
    .auth-card { background: linear-gradient(145deg, rgba(60,36,21,0.88), rgba(26,15,10,0.96)); border: 1px solid rgba(200,133,58,0.25); border-radius: 20px; padding: 36px; backdrop-filter: blur(20px); }
    .toggle-bar { display: flex; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .toggle-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; background: transparent; color: rgba(245,230,211,0.5); }
    .toggle-btn.active { background: linear-gradient(135deg, #C8853A, #8B4513); color: #FFF8F0; }
    .fields { display: flex; flex-direction: column; gap: 14px; }
    .field-wrap { display: flex; flex-direction: column; gap: 4px; }
    .input-field { background: rgba(255,248,240,0.07); border: 1px solid rgba(200,133,58,0.3); border-radius: 8px; padding: 13px 16px; color: #F5E6D3; font-size: 14px; font-family: 'Lato', sans-serif; width: 100%; outline: none; transition: all 0.3s; }
    .input-field:focus { border-color: #C8853A; background: rgba(255,248,240,0.12); box-shadow: 0 0 0 3px rgba(200,133,58,0.15); }
    .input-field::placeholder { color: rgba(245,230,211,0.38); }
    .input-field.error { border-color: #E05C5C; }
    .err-msg { color: #E05C5C; font-size: 11px; font-family: 'Lato', sans-serif; }
    .brew-btn { background: linear-gradient(135deg, #C8853A, #8B4513); color: #FFF8F0; border: none; border-radius: 8px; padding: 14px 32px; font-size: 15px; font-family: 'Lato', sans-serif; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; width: 100%; margin-top: 24px; }
    .brew-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200,133,58,0.4); background: linear-gradient(135deg, #E09A50, #A0522D); }
    .divider-or { display: flex; align-items: center; gap: 12px; color: rgba(245,230,211,0.3); font-size: 12px; letter-spacing: 2px; margin: 20px 0; }
    .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: rgba(200,133,58,0.2); }
    .google-btn { background: #FFF8F0; color: #3C2415; border: 2px solid #C8853A; border-radius: 8px; padding: 13px 32px; font-size: 14px; font-family: 'Lato', sans-serif; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .google-btn:hover { background: #FFF0DC; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,133,58,0.2); }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(245,230,211,0.28); letter-spacing: 0.5px; }

    /* ===== CAFES PAGE ===== */
    #cafes-page { position: relative; z-index: 1; min-height: 100vh; display: none; }
    header { border-bottom: 1px solid rgba(200,133,58,0.15); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; background: rgba(26,15,10,0.85); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 50; }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo h1 { font-family: 'Playfair Display', serif; font-size: 22px; color: #C8853A; letter-spacing: 2px; line-height: 1; }
    .header-logo span { font-size: 10px; color: rgba(245,230,211,0.4); letter-spacing: 3px; display: block; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .welcome-txt { font-size: 13px; color: rgba(245,230,211,0.55); }
    .welcome-txt strong { color: #C8853A; }
    .signout-btn { background: transparent; border: 1px solid rgba(200,133,58,0.3); color: rgba(245,230,211,0.5); border-radius: 6px; padding: 7px 14px; cursor: pointer; font-family: 'Lato', sans-serif; font-size: 12px; letter-spacing: 1px; transition: all 0.3s; }
    .signout-btn:hover { border-color: #C8853A; color: #C8853A; }
    .hero { padding: 48px 24px 28px; text-align: center; max-width: 700px; margin: 0 auto; }
    .hero .eyebrow { font-family: 'Playfair Display', serif; font-style: italic; color: rgba(200,133,58,0.7); font-size: 13px; letter-spacing: 4px; margin-bottom: 12px; }
    .hero h2 { font-family: 'Playfair Display', serif; font-size: clamp(26px, 5vw, 44px); font-weight: 700; color: #F5E6D3; line-height: 1.2; margin-bottom: 12px; }
    .hero h2 span { color: #C8853A; }
    .hero p { font-size: 15px; color: rgba(245,230,211,0.5); line-height: 1.7; }
    .controls { max-width: 1100px; margin: 0 auto; padding: 0 24px 24px; }
    .search-box { background: rgba(255,248,240,0.07); border: 1.5px solid rgba(200,133,58,0.3); border-radius: 50px; padding: 13px 22px; color: #F5E6D3; font-size: 14px; font-family: 'Lato', sans-serif; outline: none; transition: all 0.3s; width: 100%; max-width: 480px; margin-bottom: 18px; }
    .search-box:focus { border-color: #C8853A; background: rgba(255,248,240,0.1); box-shadow: 0 0 0 3px rgba(200,133,58,0.12); }
    .search-box::placeholder { color: rgba(245,230,211,0.33); }
    .area-pills { display: flex; gap: 10px; flex-wrap: wrap; }
    .area-pill { padding: 8px 18px; border-radius: 25px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: all 0.25s; border: 1.5px solid rgba(200,133,58,0.3); background: transparent; color: rgba(245,230,211,0.55); }
    .area-pill.active { background: linear-gradient(135deg, #C8853A, #8B4513); border-color: transparent; color: #FFF8F0; box-shadow: 0 4px 15px rgba(200,133,58,0.3); }
    .area-pill:hover:not(.active) { border-color: #C8853A; color: #C8853A; }
    .result-count { font-size: 12px; color: rgba(245,230,211,0.3); margin-top: 14px; letter-spacing: 1px; }
    .grid { max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .cafe-card { background: linear-gradient(145deg, rgba(60,36,21,0.9), rgba(40,20,10,0.95)); border: 1px solid rgba(200,133,58,0.2); border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.35s; position: relative; overflow: hidden; }
    .cafe-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, rgba(200,133,58,0.8), transparent); opacity: 0; transition: opacity 0.3s; }
    .cafe-card:hover { transform: translateY(-4px); border-color: rgba(200,133,58,0.5); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(200,133,58,0.1); }
    .cafe-card:hover::before { opacity: 1; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .card-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .card-rating { text-align: right; }
    .card-rating .stars { color: #C8853A; font-size: 14px; letter-spacing: 1px; }
    .card-rating .rev-count { font-size: 11px; color: rgba(245,230,211,0.38); margin-top: 2px; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 18px; color: #F5E6D3; margin-bottom: 4px; line-height: 1.3; }
    .card-meta { font-size: 12px; color: #C8853A; margin-bottom: 10px; letter-spacing: 0.5px; }
    .card-desc { font-size: 13px; color: rgba(245,230,211,0.6); line-height: 1.6; margin-bottom: 16px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag { background: rgba(200,133,58,0.13); border: 1px solid rgba(200,133,58,0.3); color: #C8853A; border-radius: 20px; padding: 3px 10px; font-size: 11px; letter-spacing: 0.5px; }
    .card-footer { border-top: 1px solid rgba(200,133,58,0.1); padding-top: 12px; display: flex; justify-content: space-between; align-items: center; }
    .card-hours { font-size: 11px; color: rgba(245,230,211,0.33); letter-spacing: 0.5px; }
    .card-view { font-size: 11px; color: #C8853A; letter-spacing: 1px; }
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; }
    .empty-state .cup { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: rgba(245,230,211,0.4); }
    .empty-state p { font-size: 13px; color: rgba(245,230,211,0.23); margin-top: 8px; }

    /* ===== MODAL ===== */
    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease; }
    #modal-overlay.open { display: flex; }
    .modal-box { background: linear-gradient(145deg, #2D1810, #1A0F0A); border: 1px solid rgba(200,133,58,0.35); border-radius: 20px; padding: 36px; max-width: 500px; width: 100%; position: relative; animation: slideUp 0.3s ease; max-height: 85vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(200,133,58,0.15); border: 1px solid rgba(200,133,58,0.3); color: #C8853A; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    .modal-close:hover { background: rgba(200,133,58,0.3); }
    .modal-cup { font-size: 42px; margin-bottom: 16px; }
    .modal-name { font-family: 'Playfair Display', serif; font-size: 26px; color: #F5E6D3; margin-bottom: 6px; }
    .modal-addr { font-size: 13px; color: #C8853A; margin-bottom: 16px; letter-spacing: 0.5px; }
    .modal-stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-box { background: rgba(200,133,58,0.1); border: 1px solid rgba(200,133,58,0.2); border-radius: 10px; padding: 12px 18px; }
    .stat-label { font-size: 11px; color: rgba(245,230,211,0.38); letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
    .stat-value { color: #C8853A; font-size: 16px; font-weight: 700; }
    .stat-sub { font-size: 11px; color: rgba(245,230,211,0.33); }
    .modal-desc { font-size: 14px; color: rgba(245,230,211,0.7); line-height: 1.7; margin-bottom: 20px; }
    .modal-vibes-label { font-size: 11px; color: rgba(245,230,211,0.38); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    .modal-info { border-top: 1px solid rgba(200,133,58,0.15); padding-top: 18px; display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
    .modal-info-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(245,230,211,0.6); }

    /* ===== TOAST ===== */
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: linear-gradient(135deg, #C8853A, #8B4513); color: #FFF8F0; padding: 14px 28px; border-radius: 50px; font-size: 14px; font-weight: 700; z-index: 999; opacity: 0; transition: all 0.3s ease; box-shadow: 0 8px 30px rgba(200,133,58,0.4); pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .header-right .welcome-txt { display: none; }
      .hero { padding: 32px 16px 20px; }
      .controls, .grid { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

<div id="bg-deco"></div>

<!-- ===== AUTH PAGE ===== -->
<div id="auth-page">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="cup">☕</div>
      <h1>BREW</h1>
      <p>Chennai's Café Guide</p>
      <div class="divider-line"></div>
    </div>
    <div class="auth-card">
      <div class="toggle-bar">
        <button class="toggle-btn active" id="btn-signin" onclick="switchMode('signin')">Sign In</button>
        <button class="toggle-btn" id="btn-signup" onclick="switchMode('signup')">Sign Up</button>
      </div>
      <div class="fields" id="fields">
        <!-- injected by JS -->
      </div>
      <button class="brew-btn" id="auth-submit">Enter the Café ☕</button>
      <div class="divider-or">OR CONTINUE WITH</div>
      <button class="google-btn" onclick="googleSignIn()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>
    </div>
    <p class="auth-footer">Discover the finest cafés across Chennai</p>
  </div>
</div>

<!-- ===== CAFES PAGE ===== -->
<div id="cafes-page">
  <header>
    <div class="header-logo">
      <div style="font-size:26px">☕</div>
      <div>
        <h1>BREW</h1>
        <span>CHENNAI CAFÉS</span>
      </div>
    </div>
    <div class="header-right">
      <p class="welcome-txt">Hi, <strong id="user-display"></strong></p>
      <button class="signout-btn" onclick="signOut()">SIGN OUT</button>
    </div>
  </header>

  <div class="hero">
    <p class="eyebrow">EXPLORE</p>
    <h2>Chennai's Finest <span>Coffee Haunts</span></h2>
    <p id="hero-sub">12 handpicked cafés, from serene garden retreats to specialty roasteries</p>
  </div>

  <div class="controls">
    <input class="search-box" type="text" placeholder="🔍  Search cafés, areas, vibes..." id="search-input" oninput="filterCafes()" />
    <div class="area-pills" id="area-pills"></div>
    <p class="result-count" id="result-count"></p>
  </div>

  <div class="grid" id="cafe-grid"></div>
</div>

<!-- ===== MODAL ===== -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
  // ===== DATA =====
  const CAFES = [
    { id:1, name:"The Brew Room", address:"146, Dr Radha Krishnan Salai, Mylapore", area:"Mylapore", rating:4.4, reviews:3461, price:"₹₹₹", hours:"10:00 AM – 11:00 PM", phone:"+91 97109 47380", tags:["Coffee","Garden Seating","European"], description:"A hidden gem for coffee lovers with warm cozy ambience and freshly brewed signature cold brews.", emoji:"☕", color:"#6B3A2A" },
    { id:2, name:"Chamiers Café", address:"106, Pasumpon Muthuramalinga Thevar Rd, RA Puram", area:"Alwarpet", rating:4.3, reviews:3335, price:"₹₹₹", hours:"8:30 AM – 10:30 PM", phone:"+91 44 4203 0734", tags:["Brunch","Romantic","Vintage"], description:"A Victorian-style bungalow cafe with soft lighting and wicker chairs — perfect for long conversations.", emoji:"🌿", color:"#3A5A40" },
    { id:3, name:"Café de Paris", address:"24, Cenotaph Rd, Teynampet", area:"Teynampet", rating:4.1, reviews:2255, price:"₹₹₹", hours:"12:00 PM – 11:00 PM", phone:"+91 98848 15553", tags:["Bakery","Garden","Date Spot"], description:"A dreamy glasshouse decked in bushes — looks magical at night with an in-house bakery.", emoji:"🥐", color:"#8B6914" },
    { id:4, name:"Writer's Café", address:"98, Peter's Rd, Gopalapuram", area:"Gopalapuram", rating:4.4, reviews:7612, price:"₹₹", hours:"9:00 AM – 10:00 PM", phone:"+91 89258 44029", tags:["Books","Budget-friendly","Charity"], description:"A cozy bookish spot with profits going to rehab causes. Great pizzas, pastas, and hot chocolate.", emoji:"📚", color:"#2D4A7A" },
    { id:5, name:"Wild Garden Cafe", address:"Amethyst, Whites Rd, Royapettah", area:"Royapettah", rating:4.3, reviews:7953, price:"₹₹₹₹", hours:"10:00 AM – 10:30 PM", phone:"+91 44 4599 1633", tags:["Serene","Pet Friendly","Al Fresco"], description:"The best cafe in Chennai — serene atmosphere with cats, filter coffee, and lush greenery.", emoji:"🌸", color:"#5C4033" },
    { id:6, name:"The Entrance Cafe", address:"4, 63, Taylors Rd, Kilpauk", area:"Kilpauk", rating:4.2, reviews:1448, price:"₹₹₹₹", hours:"8:30 AM – 10:30 PM", phone:"+91 79046 86050", tags:["Elegant","Photo-worthy","Fine Dining"], description:"Elegant ambience with outdoor seating that's calm, cozy and perfect for pictures.", emoji:"✨", color:"#4A3728" },
    { id:7, name:"The Bistrograph", address:"13, 10th Cross St, Adyar", area:"Adyar", rating:4.4, reviews:1330, price:"₹₹", hours:"11:00 AM – 11:00 PM", phone:"+91 73059 92096", tags:["Cozy","Aesthetic","Bistro"], description:"Cozy, neat and calming. A must-try are the cheesy jalapeño croquettes and chocolate tart.", emoji:"🎨", color:"#1A3A4A" },
    { id:8, name:"Tea Villa Cafe", address:"40, Thirumalai Pillai Rd, T. Nagar", area:"T. Nagar", rating:4.5, reviews:6442, price:"₹₹₹", hours:"12:00 PM – 2:00 AM", phone:"+91 94440 56991", tags:["Vegetarian","Late Night","Events"], description:"Pure vegetarian cafe with a wide range of cuisines and delicious milkshakes till 2 AM.", emoji:"🍵", color:"#2E5C3A" },
    { id:9, name:"Beachville Coffee Roasters", address:"99, St Marys Rd, Alwarpet", area:"Alwarpet", rating:4.3, reviews:713, price:"₹₹", hours:"7:00 AM – 9:45 PM", phone:"+91 96770 53244", tags:["Specialty Coffee","Early Bird","Roastery"], description:"Expertly crafted specialty coffee with magical flavor combinations like elderflower work tonic.", emoji:"🫘", color:"#6B3A1A" },
    { id:10, name:"DOU", address:"25, Cenotaph Rd, Alwarpet", area:"Alwarpet", rating:4.4, reviews:2079, price:"₹₹₹", hours:"8:00 AM – 10:30 PM", phone:"+91 99400 91849", tags:["Breakfast","Cinnamon Rolls","All-day"], description:"Laid-back vibe with amazing breakfast. Come for quick bites — you'll end up staying for hours.", emoji:"🥐", color:"#7A4A1A" },
    { id:11, name:"GLOW CAFE", address:"Haddows Road, AJ Block, Nungambakkam", area:"Nungambakkam", rating:4.3, reviews:988, price:"₹₹", hours:"11:00 AM – 11:00 PM", phone:"+91 90439 43705", tags:["Aesthetic","Vegetarian","Cozy"], description:"Calm, picture-perfect vibe with warm interiors — great tiramisu and authentic Italian pastas.", emoji:"💫", color:"#3A2A5C" },
    { id:12, name:"Soroco House", address:"68/1, AD Block, Anna Nagar", area:"Anna Nagar", rating:4.0, reviews:456, price:"₹₹", hours:"8:00 AM – 11:00 PM", phone:"+91 98843 77632", tags:["WFH Friendly","WiFi","Chill"], description:"A chill space to vibe and work. Great caffeinated beverages and their Jungle sandwich is a must-try.", emoji:"🌴", color:"#1A4A3A" }
  ];

  const AREAS = ["All", ...new Set(CAFES.map(c => c.area))];
  let currentMode = "signin";
  let currentArea = "All";
  let currentUser = null;

  // ===== AUTH =====
  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('btn-signin').classList.toggle('active', mode === 'signin');
    document.getElementById('btn-signup').classList.toggle('active', mode === 'signup');
    document.getElementById('auth-submit').textContent = mode === 'signin' ? 'Enter the Café ☕' : 'Join the Community ✨';
    renderFields();
  }

  function renderFields() {
    const container = document.getElementById('fields');
    if (currentMode === 'signup') {
      container.innerHTML = `
        <div class="field-wrap">
          <input class="input-field" id="f-name" placeholder="Full Name" type="text"/>
          <span class="err-msg" id="e-name"></span>
        </div>
        <div class="field-wrap">
          <input class="input-field" id="f-username" placeholder="Username" type="text"/>
          <span class="err-msg" id="e-username"></span>
        </div>
        <div class="field-wrap">
          <input class="input-field" id="f-phone" placeholder="Phone Number (10 digits)" type="tel" maxlength="10"/>
          <span class="err-msg" id="e-phone"></span>
        </div>
        <div class="field-wrap">
          <input class="input-field" id="f-pass" placeholder="Password (min 6 chars)" type="password"/>
          <span class="err-msg" id="e-pass"></span>
        </div>`;
    } else {
      container.innerHTML = `
        <div class="field-wrap">
          <input class="input-field" id="f-username" placeholder="Username" type="text"/>
          <span class="err-msg" id="e-username"></span>
        </div>
        <div class="field-wrap">
          <input class="input-field" id="f-pass" placeholder="Password" type="password"/>
          <span class="err-msg" id="e-pass"></span>
        </div>`;
    }
  }

  function clearErr(id) { const el = document.getElementById(id); if (el) { el.textContent = ''; } }
  function setErr(id, msg) { const el = document.getElementById(id); if (el) { el.textContent = msg; const inp = document.getElementById(id.replace('e-','f-')); if(inp) inp.classList.add('error'); } }

  document.addEventListener('DOMContentLoaded', () => {
    renderFields();
    document.getElementById('auth-submit').addEventListener('click', handleAuth);
    buildAreaPills();
  });

  function handleAuth() {
    let valid = true;
    ['e-name','e-username','e-phone','e-pass'].forEach(id => clearErr(id));
    ['f-name','f-username','f-phone','f-pass'].forEach(id => { const el = document.getElementById(id); if(el) el.classList.remove('error'); });

    const username = (document.getElementById('f-username') || {}).value || '';
    const pass = (document.getElementById('f-pass') || {}).value || '';

    if (!username.trim()) { setErr('e-username','Username is required'); valid = false; }
    if (!pass || pass.length < 6) { setErr('e-pass','Password must be at least 6 characters'); valid = false; }

    if (currentMode === 'signup') {
      const name = (document.getElementById('f-name') || {}).value || '';
      const phone = (document.getElementById('f-phone') || {}).value || '';
      if (!name.trim()) { setErr('e-name','Name is required'); valid = false; }
      if (!/^[6-9]\d{9}$/.test(phone)) { setErr('e-phone','Enter a valid 10-digit Indian number'); valid = false; }
      if (valid) {
        currentUser = { name, username };
        enterApp(name);
      }
    } else {
      if (valid) {
        currentUser = { name: username, username };
        enterApp(username);
      }
    }
  }

  function googleSignIn() {
    currentUser = { name: 'Google User', username: 'google_user' };
    enterApp('Google User');
  }

  function enterApp(name) {
    document.getElementById('auth-page').style.display = 'none';
    document.getElementById('cafes-page').style.display = 'block';
    document.getElementById('user-display').textContent = name;
    showToast('Welcome, ' + name + '! ☕');
    renderGrid(CAFES);
  }

  function signOut() {
    document.getElementById('cafes-page').style.display = 'none';
    document.getElementById('auth-page').style.display = 'flex';
    currentUser = null;
    currentArea = 'All';
    document.getElementById('search-input').value = '';
    switchMode('signin');
    document.querySelectorAll('.area-pill').forEach((p,i) => p.classList.toggle('active', i===0));
  }

  // ===== CAFES =====
  function buildAreaPills() {
    const container = document.getElementById('area-pills');
    container.innerHTML = AREAS.map((area, i) =>
      `<button class="area-pill${i===0?' active':''}" onclick="selectArea('${area}', this)">${area}</button>`
    ).join('');
  }

  function selectArea(area, btn) {
    currentArea = area;
    document.querySelectorAll('.area-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    filterCafes();
  }

  function filterCafes() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = CAFES.filter(c => {
      const matchArea = currentArea === 'All' || c.area === currentArea;
      const matchQ = !q || c.name.toLowerCase().includes(q) || c.area.toLowerCase().includes(q) || c.tags.some(t => t.toLowerCase().includes(q)) || c.description.toLowerCase().includes(q);
      return matchArea && matchQ;
    });
    renderGrid(filtered);
  }

  function renderGrid(list) {
    const grid = document.getElementById('cafe-grid');
    document.getElementById('result-count').textContent = list.length + (list.length === 1 ? ' café found' : ' cafés found');
    if (!list.length) {
      grid.innerHTML = `<div class="empty-state"><div class="cup">☕</div><h3>No cafés found</h3><p>Try a different search or area</p></div>`;
      return;
    }
    grid.innerHTML = list.map(c => `
      <div class="cafe-card" onclick="openModal(${c.id})">
        <div class="card-top">
          <div class="card-icon" style="background:${c.color}40; border: 1.5px solid ${c.color}60">${c.emoji}</div>
          <div class="card-rating">
            <div class="stars">${'★'.repeat(Math.floor(c.rating))}${'☆'.repeat(5-Math.floor(c.rating))}</div>
            <div class="rev-count">${c.reviews.toLocaleString()} reviews</div>
          </div>
        </div>
        <h3 class="card-name">${c.name}</h3>
        <p class="card-meta">📍 ${c.area} · ${c.price}</p>
        <p class="card-desc">${c.description}</p>
        <div class="tags">${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <div class="card-footer">
          <span class="card-hours">🕐 ${c.hours}</span>
          <span class="card-view">VIEW →</span>
        </div>
      </div>`).join('');
  }

  // ===== MODAL =====
  function openModal(id) {
    const c = CAFES.find(x => x.id === id);
    if (!c) return;
    document.getElementById('modal-content').innerHTML = `
      <div class="modal-cup">${c.emoji}</div>
      <h2 class="modal-name">${c.name}</h2>
      <p class="modal-addr">📍 ${c.address}</p>
      <div class="modal-stats">
        <div class="stat-box">
          <div class="stat-label">Rating</div>
          <div class="stat-value">★ ${c.rating}</div>
          <div class="stat-sub">${c.reviews.toLocaleString()} reviews</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Price</div>
          <div class="stat-value">${c.price}</div>
        </div>
      </div>
      <p class="modal-desc">${c.description}</p>
      <div class="modal-vibes-label">VIBES</div>
      <div class="tags">${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="modal-info">
        <div class="modal-info-row"><span>🕐</span><span>${c.hours}</span></div>
        <div class="modal-info-row"><span>📞</span><span>${c.phone}</span></div>
      </div>`;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModalBtn();
  }
  function closeModalBtn() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  // ===== TOAST =====
  // Disabled: toast component removed
  function showToast(msg) {
    // No-op; toast removed
  }

  // keyboard esc to close modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });
</script>
</body>
</html>
