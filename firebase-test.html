<!DOCTYPE html>
<html>
<head>
  <title>Firebase Connection Test</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #1a1a1a; color: #fff; }
    .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .success { background: #2d5a27; }
    .error { background: #5a2727; }
    .info { background: #2a4a6b; }
    button { padding: 10px 20px; cursor: pointer; }
    pre { background: #333; padding: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>🔥 Firebase Connection Test</h1>
  <div id="results"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const results = document.getElementById('results');

    function addStatus(message, type = 'info') {
      const div = document.createElement('div');
      div.className = `status ${type}`;
      div.innerHTML = message;
      results.appendChild(div);
    }

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyCCE5D-s4osZN9J7dhesbI5CGWkPxSi0Tw",
      authDomain: "cafe-5b867.firebaseapp.com",
      projectId: "cafe-5b867",
      storageBucket: "cafe-5b867.firebasestorage.app",
      messagingSenderId: "922765379923",
      appId: "1:922765379923:web:a1c362a9514eba941239a6",
      measurementId: "G-R7K624GCEH"
    };

    addStatus('Testing Firebase connection...', 'info');

    try {
      // Initialize Firebase
      const app = firebase.initializeApp(firebaseConfig);
      addStatus('✅ Firebase app initialized', 'success');

      // Check Auth
      const auth = firebase.auth();
      addStatus('✅ Firebase Auth initialized', 'success');

      // Check Firestore
      const db = firebase.firestore();
      addStatus('✅ Firestore initialized', 'success');

      // Test Firestore connection
      addStatus('Testing Firestore read...', 'info');

      db.collection('cafes').limit(1).get()
        .then(snapshot => {
          addStatus(`✅ Firestore connection successful! Found ${snapshot.size} cafe(s)`, 'success');

          // Show sample data if available
          if (!snapshot.empty) {
            const data = snapshot.docs[0].data();
            addStatus(`Sample cafe: <pre>${JSON.stringify(data, null, 2).substring(0, 200)}...</pre>`, 'info');
          } else {
            addStatus('ℹ️ Firestore is empty. You need to add cafe data.', 'info');
          }
        })
        .catch(err => {
          addStatus(`❌ Firestore read failed: ${err.message}`, 'error');
          addStatus(`Error code: ${err.code}`, 'error');

          if (err.code === 'permission-denied') {
            addStatus('💡 <strong>Fix:</strong> Go to Firebase Console > Firestore Database > Rules and allow read/write', 'info');
          }
          if (err.code === 'not-found') {
            addStatus('💡 <strong>Fix:</strong> Firestore database not created. Go to Firebase Console > Firestore > Create database', 'info');
          }
        });

      // Check Auth state
      auth.onAuthStateChanged(user => {
        if (user) {
          addStatus(`✅ Signed in as: ${user.email || user.uid}`, 'success');
        } else {
          addStatus('ℹ️ No user signed in (anonymous mode)', 'info');
        }
      });

    } catch (err) {
      addStatus(`❌ Firebase initialization failed: ${err.message}`, 'error');
    }
  </script>
</body>
</html>
